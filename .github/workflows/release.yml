name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release-macos:
    runs-on: macos-14   # Apple Silicon runner

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-bundle
        run: cargo install cargo-bundle

      - name: Import signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASS=ci-keychain
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASS=$KEYCHAIN_PASS"  >> $GITHUB_ENV

          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

          echo "$CERTIFICATE_P12" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          rm /tmp/cert.p12

          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

          echo "=== identities in CI keychain ==="
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true

      - name: Build and bundle
        run: make bundle

      - name: Sign
        env:
          APPLE_IDENTITY: ${{ secrets.APPLE_IDENTITY }}
        run: |
          APP="target/release/bundle/osx/Json Viewer.app"
          codesign --deep --force --options runtime \
            --entitlements assets/entitlements.plist \
            --keychain "$KEYCHAIN_PATH" \
            --sign "$APPLE_IDENTITY" \
            "$APP"
          codesign --verify --deep --strict "$APP"
          echo "Signed: $APP"

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP="target/release/bundle/osx/Json Viewer.app"
          ditto -c -k --keepParent "$APP" /tmp/jsonviewer-notarize.zip
          xcrun notarytool submit /tmp/jsonviewer-notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          rm /tmp/jsonviewer-notarize.zip

      - name: Staple and create DMG
        run: make dmg

      - name: Upload DMG to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/JsonViewer-*.dmg
