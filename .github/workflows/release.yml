name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release-macos:
    runs-on: macos-15   # Apple Silicon, Xcode 16

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Rust FFI (release)
        run: cargo build --release -p jsonview-ffi

      - name: Import signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASS=ci-keychain
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASS=$KEYCHAIN_PASS"  >> $GITHUB_ENV

          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

          echo "$CERTIFICATE_P12" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          rm /tmp/cert.p12

          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

          echo "=== signing identities ==="
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build DevKit (Release)
        run: |
          cd JsonViewApp
          xcodebuild \
            -project DevKit.xcodeproj \
            -scheme DevKit \
            -configuration Release \
            -destination "platform=macOS" \
            -derivedDataPath build/DerivedData \
            OTHER_LDFLAGS="-L$GITHUB_WORKSPACE/target/release -ljsonview_ffi" \
            CODE_SIGN_STYLE=Manual \
            "CODE_SIGN_IDENTITY=${{ secrets.APPLE_IDENTITY }}" \
            "OTHER_CODE_SIGN_FLAGS=--keychain $KEYCHAIN_PATH" \
            DEVELOPMENT_TEAM=VP83767PVX \
            build

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          APP="JsonViewApp/build/DerivedData/Build/Products/Release/DevKit.app"
          ditto -c -k --keepParent "$APP" /tmp/devkit-notarize.zip
          xcrun notarytool submit /tmp/devkit-notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id VP83767PVX \
            --wait
          rm /tmp/devkit-notarize.zip
          xcrun stapler staple "$APP"
          xcrun stapler validate "$APP"

      - name: Create DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APP="JsonViewApp/build/DerivedData/Build/Products/Release/DevKit.app"
          STAGING=$(mktemp -d)
          cp -R "$APP" "$STAGING/"
          ln -sf /Applications "$STAGING/Applications"
          hdiutil create \
            -volname "DevKit" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            "DevKit-${VERSION}.dmg"
          rm -rf "$STAGING"
          echo "DMG_PATH=DevKit-${VERSION}.dmg" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DMG_PATH }}

      - name: Update Homebrew cask sha256
        run: |
          SHA=$(shasum -a 256 "$DMG_PATH" | awk '{print $1}')
          sed -i '' \
            -e "s|version \".*\"|version \"$VERSION\"|" \
            -e "s|sha256 \".*\"|sha256 \"$SHA\"|" \
            homebrew/devkit.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add homebrew/devkit.rb
          git commit -m "chore: bump cask to v$VERSION"
          git push origin HEAD:master
