name: DevKit
options:
  bundleIdPrefix: com.fagundes
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16"

packages:
  swift-snapshot-testing:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: 1.17.0

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.fagundes.devkit
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: VP83767PVX

schemes:
  DevKit:
    build:
      targets:
        DevKit: all
    test:
      targets:
        - DevKitTests
        - DevKitSnapshotTests

targets:
  DevKit:
    type: application
    platform: macOS
    sources:
      - path: JsonViewApp
        excludes:
          - "**/*.md"
          - "Tests/**"
    resources:
      - JsonViewApp/Resources
      - JsonViewApp/Assets.xcassets
    settings:
      base:
        INFOPLIST_FILE: JsonViewApp/Info.plist
        PRODUCT_NAME: DevKit
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        OTHER_LDFLAGS:
          - "-L/Users/cristianofagundes/Projects/jsonview/target/release"
          - "-ljsonview_ffi"
          - "-lc++"
          - "-framework Foundation"
          - "-framework Security"
        LIBRARY_SEARCH_PATHS: "/Users/cristianofagundes/Projects/jsonview/target/release"
        SWIFT_OBJC_BRIDGING_HEADER: JsonViewApp/JsonViewApp-Bridging-Header.h
    preBuildScripts:
      - name: Build Rust FFI
        script: |
          export PATH="$PATH:$HOME/.cargo/bin"
          cd /Users/cristianofagundes/Projects/jsonview
          cargo build --release -p jsonview-ffi 2>&1
        basedOnDependencyAnalysis: false

  DevKitTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: JsonViewApp/Tests/DevKitTests
    dependencies:
      - target: DevKit
    settings:
      base:
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES

  DevKitSnapshotTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: JsonViewApp/Tests/DevKitSnapshotTests
    dependencies:
      - target: DevKit
      - package: swift-snapshot-testing
        product: SnapshotTesting
    settings:
      base:
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
