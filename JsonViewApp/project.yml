name: Brace
options:
  bundleIdPrefix: com.fagundes
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16"

packages:
  swift-snapshot-testing:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: 1.17.0

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.fagundes.brace
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: VP83767PVX
    ARCHS: arm64
    ONLY_ACTIVE_ARCH: NO

schemes:
  Brace:
    build:
      targets:
        Brace: all
    test:
      targets:
        - BraceTests
        - BraceSnapshotTests

targets:
  Brace:
    type: application
    platform: macOS
    sources:
      - path: JsonViewApp
        excludes:
          - "**/*.md"
          - "Tests/**"
    resources:
      - JsonViewApp/Resources
      - JsonViewApp/Assets.xcassets
      - path: JsonViewApp/en.lproj
        type: folder
    settings:
      base:
        INFOPLIST_FILE: JsonViewApp/Info.plist
        PRODUCT_NAME: Brace
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        OTHER_LDFLAGS:
          - "-L/Users/cristianofagundes/Projects/jsonview/target/release"
          - "-ljsonview_ffi"
          - "-lc++"
          - "-framework Foundation"
          - "-framework Security"
        LIBRARY_SEARCH_PATHS: "/Users/cristianofagundes/Projects/jsonview/target/release"
        SWIFT_OBJC_BRIDGING_HEADER: JsonViewApp/JsonViewApp-Bridging-Header.h
    preBuildScripts:
      - name: Build Rust FFI
        script: |
          export PATH="$PATH:$HOME/.cargo/bin"
          cd /Users/cristianofagundes/Projects/jsonview
          cargo build --release -p jsonview-ffi 2>&1
        basedOnDependencyAnalysis: false

  BraceTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: JsonViewApp/Tests/BraceTests
    dependencies:
      - target: Brace
    settings:
      base:
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES

  BraceSnapshotTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: JsonViewApp/Tests/BraceSnapshotTests
    dependencies:
      - target: Brace
      - package: swift-snapshot-testing
        product: SnapshotTesting
    settings:
      base:
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
